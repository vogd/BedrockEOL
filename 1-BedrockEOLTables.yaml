      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              try:
                  bucket_name = event['ResourceProperties']['BucketName']
                  topic_arn = event['ResourceProperties']['TopicArn']
                  if event['RequestType'] in ['Create', 'Update']:
                      try:
                          existing = s3.get_bucket_notification_configuration(Bucket=bucket_name)
                          topic_configs = existing.get('TopicConfigurations', [])
                      except:
                          topic_configs = []
                      topic_configs = [c for c in topic_configs if c.get('Id') != 'BedrockNotification']
                      topic_configs.append({'Id': 'BedrockNotification', 'TopicArn': topic_arn, 'Events': ['s3:ObjectCreated:*'],
                          'Filter': {'Key': {'FilterRules': [{'Name': 'prefix', 'Value': 'bedrock-'}]}}})
                      s3.put_bucket_notification_configuration(Bucket=bucket_name, NotificationConfiguration={'TopicConfigurations': topic_configs})
                  elif event['RequestType'] == 'Delete':
                      try:
                          existing = s3.get_bucket_notification_configuration(Bucket=bucket_name)
                          topic_configs = [c for c in existing.get('TopicConfigurations', []) if c.get('Id') != 'BedrockNotification']
                          s3.put_bucket_notification_configuration(Bucket=bucket_name, NotificationConfiguration={'TopicConfigurations': topic_configs})
                      except:
                          pass
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})

