  # ============================================
  # EventBridge Schedule
  # ============================================
  BedrockScheduleCustomResource:
    Type: Custom::BedrockSchedule
    DependsOn: 
      - BedrockEOLDataLambdaFunction
      - BedrockUpdateLambdaEnvCustomResource
    Properties:
      ServiceToken: !GetAtt BedrockScheduleFunction.Arn
      LambdaFunctionArn: !GetAtt BedrockEOLDataLambdaFunction.Arn
      ExecutionFrequencyHours: !Ref ExecutionFrequencyHours

  BedrockScheduleFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock_ScheduleCreator
      Handler: index.handler
      Role: !GetAtt BedrockScheduleRole.Arn
      Runtime: python3.11
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  events_client = boto3.client('events')
                  lambda_client = boto3.client('lambda')
                  rule_name = 'bedrock_EOLDataProcessorScheduleRule'
                  function_arn = event['ResourceProperties']['LambdaFunctionArn']
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      hours = int(event['ResourceProperties']['ExecutionFrequencyHours'])
                      schedule = f"rate({hours} hour{'s' if hours > 1 else ''})"
                      events_client.put_rule(Name=rule_name, ScheduleExpression=schedule, State='ENABLED', Description='Schedule for Bedrock EOL Data Processor')
                      events_client.put_targets(Rule=rule_name, Targets=[{'Id': 'BedrockTarget', 'Arn': function_arn}])
                      try:
                          lambda_client.add_permission(FunctionName=function_arn, StatementId='BedrockSchedulePermission',
                              Action='lambda:InvokeFunction', Principal='events.amazonaws.com',
                              SourceArn=f"arn:aws:events:{context.invoked_function_arn.split(':')[3]}:{context.invoked_function_arn.split(':')[4]}:rule/{rule_name}")
                      except lambda_client.exceptions.ResourceConflictException:
                          pass
                  elif event['RequestType'] == 'Delete':
                      try:
                          events_client.remove_targets(Rule=rule_name, Ids=['BedrockTarget'])
                          events_client.delete_rule(Name=rule_name)
                          lambda_client.remove_permission(FunctionName=function_arn, StatementId='BedrockSchedulePermission')
                      except:
                          pass
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

