  # ============================================
  # CloudWatch: EOL Metrics Publisher (Profiles + Knowledge Bases)
  # ============================================
  EOLAlertTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      TopicName: bedrock-eol-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail

  EOLMetricsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock_EOLMetricsPublisher
      Handler: index.handler
      Role: !GetAtt EOLMetricsRole.Arn
      Runtime: python3.11
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET: !Ref S3BucketName
          SNS_TOPIC_ARN: !If [HasNotificationEmail, !Ref EOLAlertTopic, '']
          ALERT_THRESHOLD_DAYS: !Ref AlertThresholdDays
      Code:
        ZipFile: |
          import boto3
          import json
          import re
          from datetime import datetime, date, timezone

          def load_jsonl(s3, bucket, prefix):
              items = []
              try:
                  resp = s3.list_objects_v2(Bucket=bucket, Prefix=prefix)
                  for obj in resp.get('Contents', []):
                      body = s3.get_object(Bucket=bucket, Key=obj['Key'])['Body'].read().decode()
                      for line in body.strip().split('\n'):
                          if line.strip():
                              items.append(json.loads(line))
              except Exception as e:
                  print(f"Error reading {prefix}: {e}")
              return items

          def parse_eol(s):
              for fmt in ['%B %d, %Y', '%Y-%m-%d']:
                  try:
                      return datetime.strptime(re.sub(r'\s+', ' ', s.strip()), fmt).date()
                  except:
                      pass
              return None

          def handler(event, context):
              s3 = boto3.client('s3')
              cw = boto3.client('cloudwatch')
              bucket = __import__('os').environ['S3_BUCKET']
              today = date.today()
              now = datetime.now(timezone.utc)

              # Build lifecycle lookup
              lifecycle = {}
              for prefix in ['bedrock-legacy-models/', 'bedrock-eol-models/']:
                  for rec in load_jsonl(s3, bucket, prefix):
                      mid = rec.get('recommended_model_id', '')
                      eol_str = rec.get('eol_date', '')
                      if mid and eol_str:
                          dt = parse_eol(eol_str)
                          if dt:
                              lifecycle[mid] = dt

              # Deduplicate inference profiles by resource_id, track worst EOL per profile
              profile_map = {}
              for p in load_jsonl(s3, bucket, 'bedrock-inference-profiles/'):
                  rid = p['resource_id']
                  mid = p['model_arn'].split('/')[-1] if '/' in p['model_arn'] else ''
                  if rid not in profile_map:
                      profile_map[rid] = {'rec': p, 'worst_days': 9999}
                  if mid in lifecycle:
                      dl = (lifecycle[mid] - today).days
                      if dl < profile_map[rid]['worst_days']:
                          profile_map[rid]['worst_days'] = dl
                          profile_map[rid]['worst_model'] = mid
              profiles = list(profile_map.values())

              # Deduplicate knowledge bases
              kb_seen = set()
              kbs = []
              for kb in load_jsonl(s3, bucket, 'bedrock-knowledge-bases/'):
                  key = (kb.get('resource_id', ''), kb.get('embedding_model_arn', ''))
                  if key not in kb_seen:
                      kb_seen.add(key)
                      kbs.append(kb)

              metric_data = []

              # Profile metrics
              p_eol = p_30 = p_60 = p_180 = 0
              for entry in profiles:
                  days_left = entry['worst_days']
                  if days_left == 9999:
                      continue
                  p = entry['rec']
                  model_id = entry.get('worst_model', '')
                  if days_left < 0: p_eol += 1
                  if days_left <= 30: p_30 += 1
                  if days_left <= 60: p_60 += 1
                  if days_left <= 180: p_180 += 1
                  metric_data.append({'MetricName': 'DaysUntilEOL', 'Value': float(days_left), 'Unit': 'Count', 'Timestamp': now,
                      'Dimensions': [{'Name': 'ResourceType', 'Value': 'InferenceProfile'},
                                     {'Name': 'AccountId', 'Value': p.get('source_account_id', '')},
                                     {'Name': 'Region', 'Value': p.get('source_region', '')},
                                     {'Name': 'ModelId', 'Value': model_id}]})

              # Knowledge base metrics
              kb_eol = kb_30 = kb_60 = kb_180 = 0
              for kb in kbs:
                  model_id = kb.get('embedding_model_arn', '').split('/')[-1] if '/' in kb.get('embedding_model_arn', '') else ''
                  if model_id not in lifecycle:
                      continue
                  days_left = (lifecycle[model_id] - today).days
                  if days_left < 0: kb_eol += 1
                  if days_left <= 30: kb_30 += 1
                  if days_left <= 60: kb_60 += 1
                  if days_left <= 180: kb_180 += 1
                  metric_data.append({'MetricName': 'DaysUntilEOL', 'Value': float(days_left), 'Unit': 'Count', 'Timestamp': now,
                      'Dimensions': [{'Name': 'ResourceType', 'Value': 'KnowledgeBase'},
                                     {'Name': 'AccountId', 'Value': kb.get('source_account_id', '')},
                                     {'Name': 'Region', 'Value': kb.get('source_region', '')},
                                     {'Name': 'ModelId', 'Value': model_id}]})

              # Aggregates
              p_active = len(profiles) - p_180
              kb_active = len(kbs) - kb_180
              for name, val in [
                  ('ProfilesEOLPassed', p_eol), ('ProfilesAtRisk30Days', p_30),
                  ('ProfilesAtRisk60Days', p_60), ('ProfilesAtRisk180Days', p_180),
                  ('ProfilesActive', p_active),
                  ('KBsEOLPassed', kb_eol), ('KBsAtRisk30Days', kb_30),
                  ('KBsAtRisk60Days', kb_60), ('KBsAtRisk180Days', kb_180),
                  ('KBsActive', kb_active),
                  ('TotalTrackedProfiles', len(profiles)), ('TotalTrackedKBs', len(kbs))]:
                  metric_data.append({'MetricName': name, 'Value': float(val), 'Unit': 'Count', 'Timestamp': now})

              for i in range(0, len(metric_data), 25):
                  cw.put_metric_data(Namespace='BedrockLifecycle', MetricData=metric_data[i:i+25])

              # Update dashboard ARN listing
              region = __import__('os').environ.get('AWS_REGION', 'us-west-2')
              md_lines = ['| Status | Type | Account | Region | Name | Resource ARN | Model | EOL Date | Days |', '|---|---|---|---|---|---|---|---|---|']
              for entry in profiles:
                  days_left = entry['worst_days']
                  if days_left == 9999: continue
                  p = entry['rec']
                  mid = entry.get('worst_model', '')
                  st = '🔴' if days_left < 0 else '🟠' if days_left <= 30 else '🟡' if days_left <= 60 else '🔵'
                  md_lines.append(f"| {st} | Profile | {p.get('source_account_id','')} | {p.get('source_region','')} | {p.get('resource_name','')} | `{p.get('resource_arn','')}` | `{mid[:40]}` | {lifecycle.get(mid,'')} | {days_left} |")
              for kb in kbs:
                  mid = kb.get('embedding_model_arn','').split('/')[-1] if '/' in kb.get('embedding_model_arn','') else ''
                  if mid not in lifecycle: continue
                  dl = (lifecycle[mid] - today).days
                  st = '🔴' if dl < 0 else '🟠' if dl <= 30 else '🟡' if dl <= 60 else '🔵'
                  md_lines.append(f"| {st} | KB | {kb.get('source_account_id','')} | {kb.get('source_region','')} | `{kb.get('resource_name','')}` | `{mid[:40]}` | {lifecycle[mid]} | {dl} |")
              md_text = '\n'.join(md_lines)[:8000]

              # Build Active resources table
              active_lines = ['| Type | Account | Region | Name | Resource ARN | Model |', '|---|---|---|---|---|---|']
              for entry in profiles:
                  if entry['worst_days'] == 9999:
                      p = entry['rec']
                      mid = p['model_arn'].split('/')[-1] if '/' in p['model_arn'] else ''
                      active_lines.append(f"| Profile | {p.get('source_account_id','')} | {p.get('source_region','')} | {p.get('resource_name','')} | `{p.get('resource_arn','')}` | `{mid[:40]}` |")
              for kb in kbs:
                  mid = kb.get('embedding_model_arn','').split('/')[-1] if '/' in kb.get('embedding_model_arn','') else ''
                  if mid not in lifecycle:
                      active_lines.append(f"| KB | {kb.get('source_account_id','')} | {kb.get('source_region','')} | {kb.get('resource_name','')} | `{kb.get('resource_arn','')}` | `{mid[:40]}` |")
              active_text = '\n'.join(active_lines)[:8000]

              try:
                  dash_resp = cw.get_dashboard(DashboardName='Bedrock-Model-Lifecycle')
                  dash_body = json.loads(dash_resp['DashboardBody'])
                  # Find or update Legacy/EOL table
                  eol_found = False
                  active_found = False
                  for w in dash_body['widgets']:
                      if w['type'] == 'text' and '| Status' in w.get('properties',{}).get('markdown','')[:20]:
                          w['properties']['markdown'] = md_text
                          eol_found = True
                      elif w['type'] == 'text' and 'Active Resources' in w.get('properties',{}).get('markdown',''):
                          w['properties']['markdown'] = active_text
                          active_found = True
                  if not eol_found:
                      dash_body['widgets'].append({'type':'text','x':0,'y':11,'width':24,'height':10,'properties':{'markdown': md_text}})
                  if not active_found:
                      dash_body['widgets'].append({'type':'text','x':0,'y':21,'width':24,'height':1,'properties':{'markdown': '## Active Resources (no EOL planned)'}})
                      dash_body['widgets'].append({'type':'text','x':0,'y':22,'width':24,'height':8,'properties':{'markdown': active_text}})
                  cw.put_dashboard(DashboardName='Bedrock-Model-Lifecycle', DashboardBody=json.dumps(dash_body))
                  print("Dashboard ARN table updated")
              except Exception as e:
                  print(f"Dashboard update error (non-fatal): {e}")

              # Send detailed alert with affected ARNs if any resources at risk
              sns_topic = __import__('os').environ.get('SNS_TOPIC_ARN', '')
              alert_days = int(__import__('os').environ.get('ALERT_THRESHOLD_DAYS', '30'))
              if sns_topic and (p_eol > 0 or any(e['worst_days'] <= alert_days for e in profiles if e['worst_days'] != 9999) or kb_eol > 0 or any((lifecycle.get(kb.get('embedding_model_arn','').split('/')[-1], today) - today).days <= alert_days for kb in kbs if kb.get('embedding_model_arn','').split('/')[-1] in lifecycle)):
                  sns = boto3.client('sns')
                  lines = [f"Bedrock Model Lifecycle Alert - {today.isoformat()}", f"Alert threshold: {alert_days} days", ""]
                  if p_eol > 0:
                      lines.append("=== CRITICAL: Past EOL (requests will FAIL) ===")
                      lines.append(f"\nInference Profiles ({p_eol}):")
                      for entry in profiles:
                          if entry['worst_days'] < 0:
                              p = entry['rec']
                              mid = entry.get('worst_model','')
                              lines.append(f"  {p['resource_arn']}  [{mid}]  Account:{p.get('source_account_id','')}  Region:{p.get('source_region','')}")
                  if kb_eol > 0:
                      lines.append(f"\nKnowledge Bases ({kb_eol}) - REINDEX REQUIRED:")
                      for kb in kbs:
                          mid = kb.get('embedding_model_arn','').split('/')[-1] if '/' in kb.get('embedding_model_arn','') else ''
                          if mid in lifecycle and (lifecycle[mid] - today).days < 0:
                              lines.append(f"  {kb.get('resource_arn','')}  [{mid}]  Account:{kb.get('source_account_id','')}  Region:{kb.get('source_region','')}")
                  at_risk = [e for e in profiles if 0 <= e['worst_days'] <= alert_days]
                  if at_risk:
                      lines.append(f"\n=== EOL within {alert_days} days ===")
                      lines.append(f"\nInference Profiles ({len(at_risk)}):")
                      for entry in at_risk:
                          p = entry['rec']
                          mid = entry.get('worst_model','')
                          lines.append(f"  {p['resource_arn']}  [{mid}]  EOL in {entry['worst_days']}d  Account:{p.get('source_account_id','')}  Region:{p.get('source_region','')}")
                  msg = '\n'.join(lines)
                  sns.publish(TopicArn=sns_topic, Subject=f'Bedrock EOL Alert: Resources at Risk (threshold: {alert_days}d)', Message=msg[:262144])
                  print("SNS alert sent")

              print(f"Profiles: EOL={p_eol} 30d={p_30} 60d={p_60} 180d={p_180} | KBs: EOL={kb_eol} 30d={kb_30} 60d={kb_60} 180d={kb_180}")
              return {'statusCode': 200}

  EOLMetricsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EOLMetricsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetDashboard
                  - cloudwatch:PutDashboard
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  EOLMetricsSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: bedrock-eol-metrics-schedule
      ScheduleExpression: 'rate(1 day)'
      State: ENABLED
      Targets:
        - Id: EOLMetricsLambda
          Arn: !GetAtt EOLMetricsFunction.Arn

  EOLMetricsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EOLMetricsFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EOLMetricsSchedule.Arn

  # CloudWatch Alarms (only if email provided)
  AlarmEOLPassed:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotificationEmail
    Properties:
      AlarmName: Bedrock-EOL-Passed
      AlarmDescription: 'CRITICAL: Resources using models past EOL date'
      Namespace: BedrockLifecycle
      MetricName: ProfilesEOLPassed
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EOLAlertTopic
      TreatMissingData: notBreaching

  Alarm30Days:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotificationEmail
    Properties:
      AlarmName: Bedrock-EOL-Within-30-Days
      AlarmDescription: 'HIGH: Resources using models with EOL within 30 days'
      Namespace: BedrockLifecycle
      MetricName: ProfilesAtRisk30Days
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EOLAlertTopic
      TreatMissingData: notBreaching

  Alarm60Days:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotificationEmail
    Properties:
      AlarmName: Bedrock-EOL-Within-60-Days
      AlarmDescription: 'MEDIUM: Resources using models with EOL within 60 days'
      Namespace: BedrockLifecycle
      MetricName: ProfilesAtRisk60Days
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EOLAlertTopic
      TreatMissingData: notBreaching

  Alarm180Days:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotificationEmail
    Properties:
      AlarmName: Bedrock-EOL-Within-180-Days
      AlarmDescription: 'LOW: Resources using models with EOL within 180 days'
      Namespace: BedrockLifecycle
      MetricName: ProfilesAtRisk180Days
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EOLAlertTopic
      TreatMissingData: notBreaching

  AlarmKBEOLPassed:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotificationEmail
    Properties:
      AlarmName: Bedrock-KB-EOL-Passed
      AlarmDescription: 'CRITICAL: Knowledge Bases using EOL embedding models - reindex required'
      Namespace: BedrockLifecycle
      MetricName: KBsEOLPassed
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EOLAlertTopic
      TreatMissingData: notBreaching

  AlarmKB30Days:
    Type: AWS::CloudWatch::Alarm
    Condition: HasNotificationEmail
    Properties:
      AlarmName: Bedrock-KB-EOL-Within-30-Days
      AlarmDescription: 'HIGH: Knowledge Bases using models with EOL within 30 days - plan reindex'
      Namespace: BedrockLifecycle
      MetricName: KBsAtRisk30Days
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EOLAlertTopic
      TreatMissingData: notBreaching

  # CloudWatch Dashboard
  EOLDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: Bedrock-Model-Lifecycle
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"text","x":0,"y":0,"width":24,"height":1,"properties":{"markdown":"## Bedrock Model Lifecycle - EOL Risk Overview"}},
            {"type":"metric","x":0,"y":1,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","ProfilesEOLPassed"]],"title":"🔴 Profiles Past EOL","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":6,"y":1,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","ProfilesAtRisk30Days"]],"title":"🟠 Profiles EOL ≤ 30d","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":12,"y":1,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","ProfilesAtRisk60Days"]],"title":"🟡 Profiles EOL ≤ 60d","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":18,"y":1,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","ProfilesAtRisk180Days"]],"title":"⚪ Profiles EOL ≤ 180d","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":0,"y":5,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","KBsEOLPassed"]],"title":"🔴 KBs Past EOL","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":6,"y":5,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","KBsAtRisk30Days"]],"title":"🟠 KBs EOL ≤ 30d","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":12,"y":5,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","KBsAtRisk60Days"]],"title":"🟡 KBs EOL ≤ 60d","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"metric","x":18,"y":5,"width":6,"height":4,"properties":{"metrics":[["BedrockLifecycle","KBsAtRisk180Days"]],"title":"⚪ KBs EOL ≤ 180d","stat":"Maximum","period":3600,"region":"${AWS::Region}","view":"singleValue"}},
            {"type":"text","x":0,"y":9,"width":24,"height":1,"properties":{"markdown":"## All Legacy/EOL Resources\\nARN listing is populated dynamically by the metrics Lambda. See SNS alerts for full details."}}
          ]
        }

Outputs:
  BedrockEOLDataLambdaArn:
    Description: 'ARN of the Bedrock EOL Data Processor Lambda'
    Value: !GetAtt BedrockEOLDataLambdaFunction.Arn
  BedrockStateMachineArn:
    Description: 'ARN of the Step Functions state machine'
    Value: !Ref BedrockAthenaTableCreationStateMachine
  BedrockScheduleRule:
    Description: 'EventBridge rule name'
    Value: 'bedrock_EOLDataProcessorScheduleRule'
  BedrockS3NotificationTopicArn:
    Description: 'ARN of the SNS topic for S3 notifications'
    Value: !Ref BedrockS3NotificationTopic
  ConfigAggregatorUsed:
    Description: 'Config Aggregator name and region'
    Value: !Sub '${AggregatorName} (${ConfigAggregatorRegion})'
  S3DataBucket:
    Description: 'S3 bucket where source data is stored'
    Value: !Ref S3BucketName
  AthenaResultsLocation:
    Description: 'S3 location for Athena query results'
    Value: !If 
      - UseMainBucketForAthenaResults
      - !Sub 's3://${S3BucketName}/athena-results/'
      - !Sub 's3://${AthenaResultsBucket}/athena-results/'
  AthenaTables:
    Description: 'Athena tables created (6 total)'
    Value: !Sub |
      ${AthenaDatabase}.bedrock_active_models
      ${AthenaDatabase}.bedrock_legacy_models
      ${AthenaDatabase}.bedrock_eol_models
      ${AthenaDatabase}.bedrock_model_reference
      ${AthenaDatabase}.bedrock_inference_profiles
      ${AthenaDatabase}.bedrock_knowledge_bases
  DataSourceURL:
    Description: 'URL of the model lifecycle page being parsed'
    Value: 'https://docs.aws.amazon.com/bedrock/latest/userguide/model-lifecycle.html'
  ParsingMethod:
    Description: 'Method used to parse the model lifecycle page'
    Value: 'Hybrid (Standard HTML parser with AI fallback using Bedrock Claude 3 Haiku)'
  ModelReferenceTable:
    Description: 'Model reference table mapping model names to ARNs'
    Value: !Sub '${AthenaDatabase}.bedrock_model_reference - Maps model_name to model_arn using Bedrock ListFoundationModels API'
  DataExpansionFeatures:
    Description: 'Data expansion features enabled'
    Value: |
      - Active models: semicolon-separated regions/dates expanded to individual records
      - Legacy/EOL models: comma-separated regions expanded, "Regions" suffix and "and" removed
      - Inference Profiles: model_arn expanded from comma-separated ARNs, is_multi_model flag added
      - Knowledge Bases: embedding_model_arn expanded from comma-separated ARNs, is_multi_model flag added