          # ============================================
          # Main Lambda Handler
          # ============================================
          def lambda_handler(event, context):
              bucket_name = os.environ['S3_BUCKET_NAME']
              aggregator_name = os.environ['AGGREGATOR_NAME']
              config_region = os.environ.get('CONFIG_AGGREGATOR_REGION', 'us-east-1')
              print("=" * 60)
              print("BEDROCK EOL TRACKER - WITH DATA EXPANSION")
              print("=" * 60)
              config_client = boto3.client('config', region_name=config_region)
              stepfunctions = boto3.client('stepfunctions')
              account_number = context.invoked_function_arn.split(":")[4]
              collected_at = datetime.utcnow().isoformat() + 'Z'
              try:
                  print("\nSTEP 1: Parsing model lifecycle HTML...")
                  active_models_raw, legacy_models_raw, eol_models_raw = parse_model_lifecycle_html()
                  print(f"Raw counts - Active: {len(active_models_raw)}, Legacy: {len(legacy_models_raw)}, EOL: {len(eol_models_raw)}")
                  
                  print("\nSTEP 2: Building active models from Bedrock API...")
                  foundation_models = get_foundation_models_from_bedrock()
                  active_models = []
                  for fm in foundation_models:
                      if fm.get('model_lifecycle_status', '').upper() == 'ACTIVE':
                          active_models.append({
                              'provider': fm.get('provider_name', ''),
                              'model_name': fm.get('model_name', ''),
                              'model_id': fm.get('model_id', ''),
                              'regions_supported': '',
                              'launch_date': '',
                              'eol_date': '',
                              'input_modalities': fm.get('input_modalities', ''),
                              'output_modalities': fm.get('output_modalities', ''),
                              'collected_at': collected_at
                          })
                  print(f"Active models from API: {len(active_models)}")
                  
                  print("\nSTEP 2b: Expanding legacy/EOL records by region...")
                  legacy_models = expand_legacy_models(legacy_models_raw)
                  eol_models = expand_eol_models(eol_models_raw)
                  print(f"Expanded counts - Legacy: {len(legacy_models)}, EOL: {len(eol_models)}")
                  
                  if active_models:
                      update_s3_file(bucket_name, 'bedrock-active-models', 'active.json', '\n'.join(json.dumps(item) for item in active_models), account_number)
                  if legacy_models:
                      update_s3_file(bucket_name, 'bedrock-legacy-models', 'legacy.json', '\n'.join(json.dumps(item) for item in legacy_models), account_number)
                  if eol_models:
                      update_s3_file(bucket_name, 'bedrock-eol-models', 'eol.json', '\n'.join(json.dumps(item) for item in eol_models), account_number)
                  
                  print("\nSTEP 3: Building model reference table...")
                  model_reference = build_model_reference(active_models, legacy_models_raw, eol_models_raw, collected_at)
                  if model_reference:
                      update_s3_file(bucket_name, 'bedrock-model-reference', 'reference.json', '\n'.join(json.dumps(item) for item in model_reference), account_number)
                  
                  print("\nSTEP 4: Getting Inference Profiles...")
                  profiles = get_inference_profiles_from_config(config_client, aggregator_name)
                  if profiles:
                      update_s3_file(bucket_name, 'bedrock-inference-profiles', 'profiles.json', '\n'.join(json.dumps(item) for item in profiles), account_number)
                  
                  print("\nSTEP 5: Getting Knowledge Bases...")
                  knowledge_bases = get_knowledge_bases_from_config(config_client, aggregator_name)
                  if knowledge_bases:
                      update_s3_file(bucket_name, 'bedrock-knowledge-bases', 'knowledge-bases.json', '\n'.join(json.dumps(item) for item in knowledge_bases), account_number)
                  
                  print("\nSTEP 6: Triggering Athena table creation...")
                  results_bucket = os.environ.get('ATHENA_RESULTS_BUCKET', bucket_name)
                  response = stepfunctions.start_execution(
                      stateMachineArn=os.environ['STATE_MACHINE_ARN'],
                      input=json.dumps({'S3BucketName': bucket_name, 'AthenaDatabase': os.environ['ATHENA_DATABASE'],
                          'AthenaWorkGroup': os.environ['ATHENA_WORK_GROUP'], 'AthenaResultsBucket': results_bucket})
                  )
                  print(f"Started Step Function: {response['executionArn']}")
                  summary = {
                      'active_models_from_api': len(active_models),
                      'legacy_models_raw': len(legacy_models_raw), 'legacy_models_expanded': len(legacy_models),
                      'eol_models_raw': len(eol_models_raw), 'eol_models_expanded': len(eol_models),
                      'model_reference': len(model_reference),
                      'inference_profiles': len(profiles),
                      'knowledge_bases': len(knowledge_bases)
                  }
                  print(f"\nSUMMARY: {json.dumps(summary, indent=2)}")
                  return {'statusCode': 200, 'body': json.dumps(summary)}
              except Exception as e:
                  print(f"ERROR: {str(e)}")
                  import traceback
                  traceback.print_exc()
                  return {'statusCode': 500, 'body': json.dumps(f'Error: {str(e)}')}

