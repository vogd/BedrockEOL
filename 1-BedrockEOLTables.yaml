AWSTemplateFormatVersion: '2010-09-09'
Description: 'Bedrock EOL Tracker - Hybrid parsing with data expansion for model lifecycle and AWS Config resources'

Parameters:
  AggregatorName:
    Type: String
    Description: 'Name of the AWS Config Aggregator'
  ConfigAggregatorRegion:
    Type: String
    Description: 'Region where the Config Aggregator exists'
    Default: 'us-east-1'
  S3BucketName:
    Type: String
    Description: 'Name of the S3 bucket to store the data'
  AthenaWorkGroup:
    Type: String
    Description: 'Athena Workgroup to use'
    Default: 'primary'
  AthenaDatabase:
    Type: String
    Description: 'Athena Database to use'
    Default: 'default'
  AthenaResultsBucket:
    Type: String
    Description: 'S3 bucket for Athena query results (leave empty to use the main data bucket)'
    Default: ''
  ExecutionFrequencyHours:
    Type: Number
    Description: 'Frequency of BedrockEOLDataProcessor execution in hours. Max 168.'
    Default: 24
    MinValue: 1
    MaxValue: 168
  NotificationEmail:
    Type: String
    Description: 'Email for EOL alert notifications (leave empty to skip alerts)'
    Default: ''
  AlertThresholdDays:
    Type: String
    Description: 'Alert when resources have EOL within this many days'
    AllowedValues:
      - '30'
      - '60'
      - '180'
    Default: '30'

Conditions:
  UseMainBucketForAthenaResults: !Equals 
    - !Ref AthenaResultsBucket
    - ''
  HasNotificationEmail: !Not
    - !Equals
      - !Ref NotificationEmail
      - ''

Resources:
  # ============================================
  # Check Athena Tables Function
  # ============================================
  BedrockCheckAthenaTablesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock_CheckAthenaTables
      Handler: index.handler
      Role: !GetAtt BedrockCheckAthenaTablesRole.Arn
      Runtime: python3.11
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import os
          
          def handler(event, context):
              athena = boto3.client('athena')
              database = event.get('AthenaDatabase', os.environ.get('ATHENA_DATABASE'))
              
              if not database:
                  raise ValueError("AthenaDatabase not provided")
              
              tables = [
                  'bedrock_active_models',
                  'bedrock_legacy_models',
                  'bedrock_eol_models',
                  'bedrock_inference_profiles',
                  'bedrock_knowledge_bases',
                  'bedrock_model_reference'
              ]
              
              try:
                  for table in tables:
                      athena.get_table_metadata(
                          CatalogName='AwsDataCatalog',
                          DatabaseName=database,
                          TableName=table
                      )
                  return {'tablesExist': True}
              except Exception as e:
                  print(f"Table check failed: {str(e)}")
                  return {'tablesExist': False}

  BedrockCheckAthenaTablesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockCheckAthenaTablesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:GetTableMetadata
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  # ============================================
  # Athena Table Creator Function
  # ============================================
  BedrockAthenaTableCreatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock_AthenaTableCreator
      Handler: index.handler
      Role: !GetAtt BedrockAthenaTableCreatorRole.Arn
      Runtime: python3.11
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import time

          def execute_query(athena_client, query, database, workgroup, output_location):
              response = athena_client.start_query_execution(
                  QueryString=query,
                  QueryExecutionContext={'Database': database},
                  WorkGroup=workgroup,
                  ResultConfiguration={'OutputLocation': output_location}
              )
              query_execution_id = response['QueryExecutionId']
              
              while True:
                  result = athena_client.get_query_execution(QueryExecutionId=query_execution_id)
                  status = result['QueryExecution']['Status']['State']
                  if status in ['SUCCEEDED', 'FAILED', 'CANCELLED']:
                      break
                  time.sleep(2)
              
              if status != 'SUCCEEDED':
                  reason = result['QueryExecution']['Status'].get('StateChangeReason', 'Unknown')
                  raise Exception(f"Query failed: {status}, reason: {reason}")

          def handler(event, context):
              athena = boto3.client('athena')
              s3_bucket = event['S3BucketName']
              database = event['AthenaDatabase']
              workgroup = event['AthenaWorkGroup']
              
              results_bucket = event.get('AthenaResultsBucket')
              if not results_bucket or results_bucket.strip() == '':
                  results_bucket = s3_bucket
              
              output_location = f"s3://{results_bucket}/athena-results/"
              
              print(f"S3 Data Bucket: {s3_bucket}")
              print(f"Athena Results Bucket: {results_bucket}")
              print(f"Database: {database}")

              queries = [
                  f"""
                  CREATE EXTERNAL TABLE IF NOT EXISTS `{database}`.`bedrock_active_models` (
                    `provider` string,
                    `model_name` string,
                    `model_id` string,
                    `regions_supported` string,
                    `launch_date` string,
                    `eol_date` string,
                    `input_modalities` string,
                    `output_modalities` string,
                    `collected_at` string
                  )
                  ROW FORMAT SERDE 'org.openx.data.jsonserde.JsonSerDe'
                  LOCATION 's3://{s3_bucket}/bedrock-active-models/'
                  """,
                  
                  f"""
                  CREATE EXTERNAL TABLE IF NOT EXISTS `{database}`.`bedrock_legacy_models` (
                    `model_name` string,
                    `legacy_date` string,
                    `legacy_region` string,
                    `public_extended_access_date` string,
                    `public_extended_access_region` string,
                    `eol_date` string,
                    `eol_region` string,
                    `recommended_replacement` string,
                    `recommended_model_id` string,
                    `collected_at` string
                  )
                  ROW FORMAT SERDE 'org.openx.data.jsonserde.JsonSerDe'
                  LOCATION 's3://{s3_bucket}/bedrock-legacy-models/'
                  """,
                  
                  f"""
                  CREATE EXTERNAL TABLE IF NOT EXISTS `{database}`.`bedrock_eol_models` (
                    `model_name` string,
                    `legacy_date` string,
                    `legacy_region` string,
                    `eol_date` string,
                    `eol_region` string,
                    `recommended_replacement` string,
                    `recommended_model_id` string,
                    `collected_at` string
                  )
                  ROW FORMAT SERDE 'org.openx.data.jsonserde.JsonSerDe'
                  LOCATION 's3://{s3_bucket}/bedrock-eol-models/'
                  """,
                  
                  f"""
                  CREATE EXTERNAL TABLE IF NOT EXISTS `{database}`.`bedrock_inference_profiles` (
                    `resource_id` string,
                    `resource_name` string,
                    `resource_arn` string,
                    `source_account_id` string,
                    `source_region` string,
                    `status` string,
                    `inference_profile_type` string,
                    `model_arn` string,
                    `is_multi_model` string,
                    `tags` string,
                    `configuration` string,
                    `created_at` string,
                    `updated_at` string,
                    `collected_at` string
                  )
                  ROW FORMAT SERDE 'org.openx.data.jsonserde.JsonSerDe'
                  LOCATION 's3://{s3_bucket}/bedrock-inference-profiles/'
                  """,
                  
                  f"""
                  CREATE EXTERNAL TABLE IF NOT EXISTS `{database}`.`bedrock_knowledge_bases` (
                    `resource_id` string,
                    `resource_name` string,
                    `resource_arn` string,
                    `source_account_id` string,
                    `source_region` string,
                    `status` string,
                    `knowledge_base_type` string,
                    `embedding_model_arn` string,
                    `is_multi_model` string,
                    `storage_type` string,
                    `tags` string,
                    `configuration` string,
                    `created_at` string,
                    `updated_at` string,
                    `collected_at` string
                  )
                  ROW FORMAT SERDE 'org.openx.data.jsonserde.JsonSerDe'
                  LOCATION 's3://{s3_bucket}/bedrock-knowledge-bases/'
                  """,
                  
                  f"""
                  CREATE EXTERNAL TABLE IF NOT EXISTS `{database}`.`bedrock_model_reference` (
                    `model_name` string,
                    `model_id` string,
                    `model_arn` string,
                    `provider_name` string,
                    `input_modalities` string,
                    `output_modalities` string,
                    `response_streaming_supported` string,
                    `customizations_supported` string,
                    `inference_types_supported` string,
                    `model_lifecycle_status` string,
                    `collected_at` string
                  )
                  ROW FORMAT SERDE 'org.openx.data.jsonserde.JsonSerDe'
                  LOCATION 's3://{s3_bucket}/bedrock-model-reference/'
                  """
              ]

              for query in queries:
                  print(f"Creating table: {query.split('`')[3]}")
                  execute_query(athena, query, database, workgroup, output_location)
                  print("Success")

              return {'statusCode': 200, 'body': 'Tables created'}

  # ============================================
  # FIXED: Athena Table Creator Role with proper S3 permissions
  # ============================================
  BedrockAthenaTableCreatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAthenaTableCreatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:CreateDatabase
                  - glue:GetDatabase
                  - glue:CreateTable
                  - glue:DeleteTable
                  - glue:UpdateTable
                  - glue:GetTable
                  - glue:GetTables
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - !If
                - UseMainBucketForAthenaResults
                - !Ref 'AWS::NoValue'
                - Effect: Allow
                  Action:
                    - s3:GetBucketLocation
                    - s3:GetObject
                    - s3:ListBucket
                    - s3:PutObject
                  Resource:
                    - !Sub 'arn:aws:s3:::${AthenaResultsBucket}'
                    - !Sub 'arn:aws:s3:::${AthenaResultsBucket}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  # ============================================
  # State Machine for Table Creation
  # ============================================
  BedrockAthenaTableCreationStateMachine:
    Type: AWS::StepFunctions::StateMachine
    DependsOn:
     - BedrockCheckAthenaTablesFunction
     - BedrockAthenaTableCreatorFunction
     - EOLMetricsFunction
    Properties:
      StateMachineName: bedrock_AthenaTableCreationStateMachine
      DefinitionString: !Sub
        - |-
          {
            "Comment": "Creates Bedrock Athena tables and publishes CloudWatch metrics",
            "StartAt": "CheckAthenaTablesExist",
            "States": {
              "CheckAthenaTablesExist": {
                "Type": "Task",
                "Resource": "${CheckAthenaTablesLambdaArn}",
                "Next": "TablesExist?",
                "ResultPath": "$.checkResult",
                "Retry": [{"ErrorEquals": ["States.ALL"], "IntervalSeconds": 2, "MaxAttempts": 3, "BackoffRate": 2}]
              },
              "TablesExist?": {
                "Type": "Choice",
                "Choices": [{"Variable": "$.checkResult.tablesExist", "BooleanEquals": true, "Next": "PublishMetrics"}],
                "Default": "CreateAthenaTables"
              },
              "CreateAthenaTables": {
                "Type": "Task",
                "Resource": "${AthenaTableCreatorFunctionArn}",
                "Next": "PublishMetrics",
                "Retry": [{"ErrorEquals": ["States.ALL"], "IntervalSeconds": 2, "MaxAttempts": 3, "BackoffRate": 2}]
              },
              "PublishMetrics": {
                "Type": "Task",
                "Resource": "${EOLMetricsFunctionArn}",
                "Next": "Success",
                "Retry": [{"ErrorEquals": ["States.ALL"], "IntervalSeconds": 2, "MaxAttempts": 3, "BackoffRate": 2}]
              },
              "Success": {"Type": "Succeed"}
            }
          }
        - CheckAthenaTablesLambdaArn: !GetAtt BedrockCheckAthenaTablesFunction.Arn
          AthenaTableCreatorFunctionArn: !GetAtt BedrockAthenaTableCreatorFunction.Arn
          EOLMetricsFunctionArn: !GetAtt EOLMetricsFunction.Arn
      RoleArn: !GetAtt BedrockStepFunctionsExecutionRole.Arn

  BedrockStepFunctionsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockStepFunctionsExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt BedrockCheckAthenaTablesFunction.Arn
                  - !GetAtt BedrockAthenaTableCreatorFunction.Arn
                  - !GetAtt EOLMetricsFunction.Arn

  # ============================================
  # Main EOL Data Processor Lambda with Data Expansion
  # ============================================
  BedrockEOLDataLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock_EOLDataProcessor
      Handler: index.lambda_handler
      Role: !GetAtt BedrockEOLDataLambdaRole.Arn
      Runtime: python3.11
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          AGGREGATOR_NAME: !Ref AggregatorName
          CONFIG_AGGREGATOR_REGION: !Ref ConfigAggregatorRegion
          S3_BUCKET_NAME: !Ref S3BucketName
          ATHENA_DATABASE: !Ref AthenaDatabase
          ATHENA_WORK_GROUP: !Ref AthenaWorkGroup
          ATHENA_RESULTS_BUCKET: !If 
            - UseMainBucketForAthenaResults
            - !Ref S3BucketName
            - !Ref AthenaResultsBucket
          STATE_MACHINE_ARN: !Ref BedrockAthenaTableCreationStateMachine
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib.request
          import re
          import os
          from datetime import datetime
          from botocore.exceptions import ClientError
          from html.parser import HTMLParser

          # ============================================
          # Data Cleaning and Expansion Functions
          # ============================================
          def split_date_and_region(value):
              if not value or value.strip() == '':
                  return '', ''
              match = re.match(r'^(.+?)\s*\(([^)]+)\)\s*$', value.strip())
              if match:
                  return match.group(1).strip(), match.group(2).strip()
              return value.strip(), ''

          def clean_region_text(value):
              if not value:
                  return value
              cleaned = re.sub(r'\s*[Rr]egions?\s*$', '', value.strip())
              cleaned = re.sub(r'\s+and\s+', ', ', cleaned)
              cleaned = re.sub(r',\s*and\s+', ', ', cleaned)
              cleaned = re.sub(r'\s*,\s*', ', ', cleaned)
              cleaned = re.sub(r'\s+', ' ', cleaned)
              return cleaned.strip()

          def expand_regions_by_comma(regions_str):
              if not regions_str:
                  return ['']
              regions_str = clean_region_text(regions_str)
              regions = [r.strip() for r in regions_str.split(',') if r.strip()]
              return regions if regions else ['']

          def expand_eol_models(eol_models):
              expanded = []
              for model in eol_models:
                  legacy_region = model.get('legacy_region', '')
                  eol_region = model.get('eol_region', '')
                  legacy_regions = expand_regions_by_comma(legacy_region)
                  eol_regions = expand_regions_by_comma(eol_region)
                  max_len = max(len(legacy_regions), len(eol_regions))
                  for i in range(max_len):
                      lr = legacy_regions[i] if i < len(legacy_regions) else legacy_regions[-1] if legacy_regions else ''
                      er = eol_regions[i] if i < len(eol_regions) else eol_regions[-1] if eol_regions else ''
                      expanded.append({
                          'model_name': model.get('model_name', ''),
                          'legacy_date': model.get('legacy_date', ''),
                          'legacy_region': lr,
                          'eol_date': model.get('eol_date', ''),
                          'eol_region': er,
                          'recommended_replacement': model.get('recommended_replacement', ''),
                          'recommended_model_id': model.get('recommended_model_id', ''),
                          'collected_at': model.get('collected_at', '')
                      })
              return expanded

          def expand_legacy_models(legacy_models):
              expanded = []
              for model in legacy_models:
                  legacy_region = model.get('legacy_region', '')
                  extended_region = model.get('public_extended_access_region', '')
                  eol_region = model.get('eol_region', '')
                  legacy_regions = expand_regions_by_comma(legacy_region)
                  extended_regions = expand_regions_by_comma(extended_region)
                  eol_regions = expand_regions_by_comma(eol_region)
                  max_len = max(len(legacy_regions), len(extended_regions), len(eol_regions))
                  for i in range(max_len):
                      lr = legacy_regions[i] if i < len(legacy_regions) else legacy_regions[-1] if legacy_regions else ''
                      exr = extended_regions[i] if i < len(extended_regions) else extended_regions[-1] if extended_regions else ''
                      er = eol_regions[i] if i < len(eol_regions) else eol_regions[-1] if eol_regions else ''
                      expanded.append({
                          'model_name': model.get('model_name', ''),
                          'legacy_date': model.get('legacy_date', ''),
                          'legacy_region': lr,
                          'public_extended_access_date': model.get('public_extended_access_date', ''),
                          'public_extended_access_region': exr,
                          'eol_date': model.get('eol_date', ''),
                          'eol_region': er,
                          'recommended_replacement': model.get('recommended_replacement', ''),
                          'recommended_model_id': model.get('recommended_model_id', ''),
                          'collected_at': model.get('collected_at', '')
                      })
              return expanded

          def clean_value_for_split(value):
              if not value:
                  return ''
              return value.replace('*', '').strip()

          def split_semicolon_values(value):
              if not value:
                  return []
              cleaned = clean_value_for_split(value)
              parts = [p.strip() for p in cleaned.split(';') if p.strip()]
              return parts

          def expand_active_models(active_models):
              expanded = []
              for model in active_models:
                  regions_str = model.get('regions_supported', '')
                  launch_str = model.get('launch_date', '')
                  eol_str = model.get('eol_date', '')
                  regions = split_semicolon_values(regions_str)
                  launch_dates = split_semicolon_values(launch_str)
                  eol_dates = split_semicolon_values(eol_str)
                  if not regions:
                      expanded.append({
                          'provider': model.get('provider', ''),
                          'model_name': model.get('model_name', ''),
                          'model_id': model.get('model_id', ''),
                          'regions_supported': clean_value_for_split(regions_str),
                          'launch_date': clean_value_for_split(launch_str),
                          'eol_date': clean_value_for_split(eol_str),
                          'input_modalities': model.get('input_modalities', ''),
                          'output_modalities': model.get('output_modalities', ''),
                          'collected_at': model.get('collected_at', '')
                      })
                      continue
                  for i, region in enumerate(regions):
                      launch_date = launch_dates[i] if i < len(launch_dates) else (launch_dates[-1] if launch_dates else '')
                      eol_date = eol_dates[i] if i < len(eol_dates) else (eol_dates[-1] if eol_dates else '')
                      expanded.append({
                          'provider': model.get('provider', ''),
                          'model_name': model.get('model_name', ''),
                          'model_id': model.get('model_id', ''),
                          'regions_supported': region,
                          'launch_date': launch_date,
                          'eol_date': eol_date,
                          'input_modalities': model.get('input_modalities', ''),
                          'output_modalities': model.get('output_modalities', ''),
                          'collected_at': model.get('collected_at', '')
                      })
              return expanded

          def split_arns_by_comma(arns_str):
              """Split comma-separated ARNs into list"""
              if not arns_str:
                  return []
              arns = [a.strip() for a in arns_str.split(',') if a.strip()]
              return arns

          # ============================================
          # S3 Helper Function
          # ============================================
          def update_s3_file(bucket_name, folder_name, file_name, data, account_number):
              s3 = boto3.client('s3')
              key = f"{folder_name}/{account_number}-{file_name}"
              try:
                  s3.put_object(Bucket=bucket_name, Key=key, Body=data.encode('UTF-8'))
                  print(f"Wrote: s3://{bucket_name}/{key}")
              except ClientError as e:
                  print(f"Error writing {key}: {str(e)}")
                  raise e

          # ============================================
          # HTML Parser Class
          # ============================================
          class TableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = []
                  self.current_row = []
                  self.current_cell = []
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False
              def handle_starttag(self, tag, attrs):
                  if tag == 'table':
                      self.in_table = True
                      self.current_table = []
                  elif tag == 'tr' and self.in_table:
                      self.in_row = True
                      self.current_row = []
                  elif tag in ['td', 'th'] and self.in_row:
                      self.in_cell = True
                      self.current_cell = []
                  elif tag == 'li' and self.in_cell:
                      if self.current_cell:
                          self.current_cell.append('; ')
              def handle_endtag(self, tag):
                  if tag == 'table' and self.in_table:
                      self.in_table = False
                      if self.current_table and len(self.current_table) > 1:
                          self.tables.append(self.current_table)
                  elif tag == 'tr' and self.in_row:
                      self.in_row = False
                      if self.current_row:
                          self.current_table.append(self.current_row)
                  elif tag in ['td', 'th'] and self.in_cell:
                      self.in_cell = False
                      cell_text = ''.join(self.current_cell).strip()
                      cell_text = re.sub(r'\s+', ' ', cell_text)
                      self.current_row.append(cell_text)
              def handle_data(self, data):
                  if self.in_cell:
                      self.current_cell.append(data)

          def identify_table_type(headers):
              headers_lower = ' '.join([h.lower() for h in headers])
              if 'legacy date' in headers_lower and 'eol' in headers_lower:
                  return 'combined_legacy_eol'
              if 'provider' in headers_lower and 'model id' in headers_lower and 'input modal' in headers_lower:
                  return 'active'
              if 'public extended access' in headers_lower or 'extended access' in headers_lower:
                  return 'legacy'
              if ('model version' in headers_lower or headers_lower.startswith('model')) and \
                 ('eol' in headers_lower or 'end of life' in headers_lower) and \
                 'public extended' not in headers_lower and 'extended access' not in headers_lower:
                  return 'eol'
              return None

          def parse_html_standard(html_content, collected_at):
              print("Attempting standard HTML parsing...")
              parser = TableParser()
              parser.feed(html_content)
              active_models, legacy_models, eol_models = [], [], []
              print(f"Found {len(parser.tables)} tables")
              for table in parser.tables:
                  if len(table) < 2:
                      continue
                  headers = table[0]
                  table_type = identify_table_type(headers)
                  if table_type:
                      print(f"Table type: {table_type}, Rows: {len(table)-1}")
                  if table_type == 'combined_legacy_eol':
                      from datetime import datetime as dt
                      today = dt.utcnow().date()
                      for row in table[1:]:
                          if len(row) >= 7:
                              eol_str = row[5].strip()
                              is_eol = False
                              try:
                                  eol_dt = dt.strptime(re.sub(r'\s+', ' ', eol_str), '%B %d, %Y').date()
                                  is_eol = eol_dt < today
                              except:
                                  pass
                              regions = row[3]
                              ext_date = row[6].strip()
                              if ext_date in ('-', '\u2014', '\u2013', ''):
                                  ext_date = ''
                              if is_eol:
                                  eol_models.append({
                                      'model_name': row[1], 'legacy_date': row[4], 'legacy_region': regions,
                                      'eol_date': eol_str, 'eol_region': regions,
                                      'recommended_replacement': '', 'recommended_model_id': row[2], 'collected_at': collected_at
                                  })
                              else:
                                  legacy_models.append({
                                      'model_name': row[1], 'legacy_date': row[4], 'legacy_region': regions,
                                      'public_extended_access_date': ext_date, 'public_extended_access_region': regions,
                                      'eol_date': eol_str, 'eol_region': regions,
                                      'recommended_replacement': '', 'recommended_model_id': row[2], 'collected_at': collected_at
                                  })
                  elif table_type == 'active':
                      for row in table[1:]:
                          if len(row) >= 8:
                              active_models.append({
                                  'provider': row[0], 'model_name': row[1], 'model_id': row[2],
                                  'regions_supported': row[3], 'launch_date': row[4], 'eol_date': row[5],
                                  'input_modalities': row[6], 'output_modalities': row[7], 'collected_at': collected_at
                              })
                  elif table_type == 'legacy':
                      for row in table[1:]:
                          if len(row) >= 6:
                              ld, lr = split_date_and_region(row[1])
                              ed, er = split_date_and_region(row[2])
                              eold, eolr = split_date_and_region(row[3])
                              legacy_models.append({
                                  'model_name': row[0], 'legacy_date': ld, 'legacy_region': lr,
                                  'public_extended_access_date': ed, 'public_extended_access_region': er,
                                  'eol_date': eold, 'eol_region': eolr,
                                  'recommended_replacement': row[4], 'recommended_model_id': row[5], 'collected_at': collected_at
                              })
                  elif table_type == 'eol':
                      for row in table[1:]:
                          if len(row) >= 5:
                              ld, lr = split_date_and_region(row[1])
                              eold, eolr = split_date_and_region(row[2])
                              eol_models.append({
                                  'model_name': row[0], 'legacy_date': ld, 'legacy_region': lr,
                                  'eol_date': eold, 'eol_region': eolr,
                                  'recommended_replacement': row[3], 'recommended_model_id': row[4], 'collected_at': collected_at
                              })
              print(f"Standard parsing: {len(active_models)} active, {len(legacy_models)} legacy, {len(eol_models)} EOL")
              return active_models, legacy_models, eol_models

          def clean_html_for_ai(html_content):
              content = re.sub(r'<script[^>]*>.*?</script>', '', html_content, flags=re.DOTALL)
              content = re.sub(r'<style[^>]*>.*?</style>', '', content, flags=re.DOTALL)
              content = re.sub(r'<nav[^>]*>.*?</nav>', '', content, flags=re.DOTALL)
              content = re.sub(r'<header[^>]*>.*?</header>', '', content, flags=re.DOTALL)
              content = re.sub(r'<footer[^>]*>.*?</footer>', '', content, flags=re.DOTALL)
              content = re.sub(r'<!--.*?-->', '', content, flags=re.DOTALL)
              main_start = content.find('<div id="main-content"')
              if main_start > 0:
                  content = content[main_start:]
              return content[:80000] if len(content) > 80000 else content

          def parse_html_with_ai(html_content, collected_at):
              print("Attempting AI parsing with Bedrock Claude...")
              bedrock = boto3.client('bedrock-runtime')
              content = clean_html_for_ai(html_content)
              print(f"Cleaned HTML size for AI: {len(content)} bytes")
              prompt = f"""Extract ALL model data from this Amazon Bedrock model lifecycle HTML page.

          The page has ONE table with these columns:
          Model provider | Model name | Model ID | Regions | Legacy date | EOL date | Public extended access start date

          IMPORTANT:
          - Some models have MULTIPLE rows for different region groups (same model, different regions with different dates). Include each row separately.
          - The "Regions" column contains comma-separated AWS region names.
          - Active models are NOT on this page. Do NOT invent active model data.
          - A dash or em-dash in "Public extended access start date" means no date set.
          - Extract every single row from the table. Do not skip any.

          Classify each row:
          - If the EOL date is in the PAST (before today {collected_at[:10]}), classify as "eol"
          - If the EOL date is in the FUTURE or today, classify as "legacy"

          Return ONLY valid JSON with no other text:
          {{"legacy_models": [{{"model_provider":"","model_name":"","model_id":"","regions":"","legacy_date":"","eol_date":"","public_extended_access_date":""}}],
          "eol_models": [{{"model_provider":"","model_name":"","model_id":"","regions":"","legacy_date":"","eol_date":"","public_extended_access_date":""}}]}}

          HTML:
          {content}"""
              try:
                  response = bedrock.invoke_model(
                      modelId='us.anthropic.claude-haiku-4-5-20251001-v1:0',
                      contentType='application/json', accept='application/json',
                      body=json.dumps({'anthropic_version': 'bedrock-2023-05-31', 'max_tokens': 100000, 'messages': [{'role': 'user', 'content': prompt}]})
                  )
                  response_body = json.loads(response['body'].read())
                  result_text = response_body['content'][0]['text']
                  json_match = re.search(r'\{[\s\S]*\}', result_text)
                  if json_match:
                      result = json.loads(json_match.group())
                      active_models = []
                      legacy_models = []
                      for m in result.get('legacy_models', []):
                          regions = m.get('regions', '')
                          ext_date = m.get('public_extended_access_date', '')
                          if ext_date in ('', '-', '\u2014', '\u2013'):
                              ext_date = ''
                          for region in expand_regions_by_comma(regions):
                              legacy_models.append({
                                  'model_name': m.get('model_name', ''),
                                  'legacy_date': m.get('legacy_date', ''),
                                  'legacy_region': region,
                                  'public_extended_access_date': ext_date,
                                  'public_extended_access_region': region,
                                  'eol_date': m.get('eol_date', ''),
                                  'eol_region': region,
                                  'recommended_replacement': '',
                                  'recommended_model_id': m.get('model_id', ''),
                                  'collected_at': collected_at
                              })
                      eol_models = []
                      for m in result.get('eol_models', []):
                          regions = m.get('regions', '')
                          for region in expand_regions_by_comma(regions):
                              eol_models.append({
                                  'model_name': m.get('model_name', ''),
                                  'legacy_date': m.get('legacy_date', ''),
                                  'legacy_region': region,
                                  'eol_date': m.get('eol_date', ''),
                                  'eol_region': region,
                                  'recommended_replacement': '',
                                  'recommended_model_id': m.get('model_id', ''),
                                  'collected_at': collected_at
                              })
                      print(f"AI parsing: {len(active_models)} active, {len(legacy_models)} legacy, {len(eol_models)} EOL")
                      return active_models, legacy_models, eol_models
              except Exception as e:
                  print(f"AI parsing error: {str(e)}")
              return [], [], []

          def parse_model_lifecycle_html():
              url = 'https://docs.aws.amazon.com/bedrock/latest/userguide/model-lifecycle.html'
              collected_at = datetime.utcnow().isoformat() + 'Z'
              try:
                  print(f"Fetching HTML from: {url}")
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60) as response:
                      html_content = response.read().decode('utf-8')
                  print(f"HTML size: {len(html_content)} bytes")
                  active, legacy, eol = parse_html_standard(html_content, collected_at)
                  if len(legacy) > 0 or len(eol) > 0:
                      print("Standard parsing successful!")
                      return active, legacy, eol
                  print("Standard parsing found no legacy/eol models, falling back to AI parsing...")
                  ai_active, ai_legacy, ai_eol = parse_html_with_ai(html_content, collected_at)
                  return (ai_active if len(ai_active) > len(active) else active,
                          ai_legacy if len(ai_legacy) > len(legacy) else legacy,
                          ai_eol if len(ai_eol) > len(eol) else eol)
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return [], [], []

          def normalize_model_name(name):
              if not name:
                  return ''
              return ' '.join(name.strip().split()).lower()

          def get_foundation_models_from_bedrock():
              bedrock = boto3.client('bedrock')
              models = []
              print("Fetching foundation models from Bedrock API...")
              try:
                  response = bedrock.list_foundation_models()
                  for model in response.get('modelSummaries', []):
                      models.append({
                          'model_id': model.get('modelId', ''), 'model_arn': model.get('modelArn', ''),
                          'model_name': model.get('modelName', ''), 'provider_name': model.get('providerName', ''),
                          'input_modalities': ', '.join(model.get('inputModalities', [])),
                          'output_modalities': ', '.join(model.get('outputModalities', [])),
                          'response_streaming_supported': str(model.get('responseStreamingSupported', False)),
                          'customizations_supported': ', '.join(model.get('customizationsSupported', [])),
                          'inference_types_supported': ', '.join(model.get('inferenceTypesSupported', [])),
                          'model_lifecycle_status': model.get('modelLifecycle', {}).get('status', '')
                      })
                  print(f"Found {len(models)} foundation models")
              except Exception as e:
                  print(f"Error fetching foundation models: {str(e)}")
              return models

          def build_model_reference(active_models, legacy_models, eol_models, collected_at):
              print("Building model reference table...")
              model_names_set = set()
              for model in active_models:
                  if model.get('model_name', '').strip():
                      model_names_set.add(model['model_name'].strip())
              for model in legacy_models:
                  if model.get('model_name', '').strip():
                      model_names_set.add(model['model_name'].strip())
              for model in eol_models:
                  if model.get('model_name', '').strip():
                      model_names_set.add(model['model_name'].strip())
              print(f"Unique model names from parsed HTML: {len(model_names_set)}")
              foundation_models = get_foundation_models_from_bedrock()
              bedrock_model_lookup = {}
              for fm in foundation_models:
                  normalized = normalize_model_name(fm['model_name'])
                  if normalized:
                      bedrock_model_lookup[normalized] = fm
              model_id_lookup = {}
              for fm in foundation_models:
                  model_id = fm.get('model_id', '')
                  if model_id:
                      base_name = model_id.split('.')[-1] if '.' in model_id else model_id
                      base_name = base_name.replace('-', ' ').replace('_', ' ').lower()
                      model_id_lookup[base_name] = fm
              reference_records = []
              matched_count = 0
              for model_name in sorted(model_names_set):
                  normalized = normalize_model_name(model_name)
                  fm = bedrock_model_lookup.get(normalized)
                  if not fm:
                      for bedrock_name, bedrock_fm in bedrock_model_lookup.items():
                          if normalized in bedrock_name or bedrock_name in normalized:
                              fm = bedrock_fm
                              break
                  if not fm:
                      for id_pattern, id_fm in model_id_lookup.items():
                          if normalized in id_pattern or id_pattern in normalized:
                              fm = id_fm
                              break
                  if fm:
                      matched_count += 1
                      reference_records.append({
                          'model_name': model_name, 'model_id': fm.get('model_id', ''), 'model_arn': fm.get('model_arn', ''),
                          'provider_name': fm.get('provider_name', ''), 'input_modalities': fm.get('input_modalities', ''),
                          'output_modalities': fm.get('output_modalities', ''), 'response_streaming_supported': fm.get('response_streaming_supported', ''),
                          'customizations_supported': fm.get('customizations_supported', ''), 'inference_types_supported': fm.get('inference_types_supported', ''),
                          'model_lifecycle_status': fm.get('model_lifecycle_status', ''), 'collected_at': collected_at
                      })
                  else:
                      reference_records.append({
                          'model_name': model_name, 'model_id': '', 'model_arn': '', 'provider_name': '',
                          'input_modalities': '', 'output_modalities': '', 'response_streaming_supported': '',
                          'customizations_supported': '', 'inference_types_supported': '', 'model_lifecycle_status': '', 'collected_at': collected_at
                      })
              parsed_normalized = {normalize_model_name(n) for n in model_names_set}
              for fm in foundation_models:
                  fm_normalized = normalize_model_name(fm['model_name'])
                  if fm_normalized and fm_normalized not in parsed_normalized:
                      reference_records.append({
                          'model_name': fm['model_name'], 'model_id': fm.get('model_id', ''), 'model_arn': fm.get('model_arn', ''),
                          'provider_name': fm.get('provider_name', ''), 'input_modalities': fm.get('input_modalities', ''),
                          'output_modalities': fm.get('output_modalities', ''), 'response_streaming_supported': fm.get('response_streaming_supported', ''),
                          'customizations_supported': fm.get('customizations_supported', ''), 'inference_types_supported': fm.get('inference_types_supported', ''),
                          'model_lifecycle_status': fm.get('model_lifecycle_status', ''), 'collected_at': collected_at
                      })
              print(f"Model reference built: {len(reference_records)} total, {matched_count} matched")
              return reference_records

